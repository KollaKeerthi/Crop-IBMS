name: Vercel Production Deployment

env:
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

jobs:
  deploy-production:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - name: Verify secrets
        run: |
          test -n "${{ secrets.VERCEL_TOKEN }}" || (echo "Missing VERCEL_TOKEN" && exit 1)
          test -n "${{ env.VERCEL_ORG_ID }}" || (echo "Missing VERCEL_ORG_ID" && exit 1)
          test -n "${{ env.VERCEL_PROJECT_ID }}" || (echo "Missing VERCEL_PROJECT_ID" && exit 1)

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Vercel pull (production)
        run: vercel pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel production env
        run: vercel env pull .env.production.local --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run database migrations
        env:
          DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # The GitHub secret takes precedence. Only fall back to the pulled
          # Vercel env file if neither secret is set, so a stray empty value in
          # .env.production.local can't clobber the secret.
          if [ -z "${DATABASE_URL_DIRECT:-}" ] && [ -z "${DATABASE_URL:-}" ]; then
            for f in .env.production.local .vercel/.env.production.local; do
              [ -f "$f" ] && { set -a; . "$f"; set +a; }
            done
          fi

          if [ -n "${DATABASE_URL_DIRECT:-}" ]; then
            echo "Using DATABASE_URL_DIRECT (length ${#DATABASE_URL_DIRECT})"
          elif [ -n "${DATABASE_URL:-}" ]; then
            echo "Using DATABASE_URL (length ${#DATABASE_URL})"
          else
            echo "Missing DATABASE_URL_DIRECT or DATABASE_URL for migrations"
            exit 1
          fi

          bunx drizzle-kit migrate

      - name: Vercel build (production)
        run: vercel build --prod --token ${{ secrets.VERCEL_TOKEN }}

      - name: Remove Git metadata
        run: |
          rm -rf .git
          unset GITHUB_ACTOR GITHUB_SHA GITHUB_REF GITHUB_HEAD_REF GITHUB_REPOSITORY

      - name: Vercel deploy (production)
        run: vercel deploy --prebuilt --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
