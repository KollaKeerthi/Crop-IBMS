services:
  teedy-server:
    image: sismics/docs:v1.11
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DOCS_BASE_URL: "http://localhost:8080"
      DOCS_ADMIN_EMAIL_INIT: "admin@example.com"
      # Initial admin password is configured in .env.local as TEEDY_PASSWORD.
      DOCS_ADMIN_PASSWORD_INIT: "$$2a$$05$$HyntZeSTtfkzVxeUFxNu7.hjH466AiysfEHaq7uSrWNNQcUf6ApzK"
      DATABASE_URL: "jdbc:postgresql://teedy-db:5432/teedy"
      DATABASE_USER: "teedy_db_user"
      DATABASE_PASSWORD: "teedy_db_password"
      DATABASE_POOL_SIZE: "10"
    volumes:
      - teedy-data:/data
    depends_on:
      - teedy-db

  teedy-db:
    image: postgres:13.1-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "teedy_db_user"
      POSTGRES_PASSWORD: "teedy_db_password"
      POSTGRES_DB: "teedy"
    volumes:
      - teedy-db:/var/lib/postgresql/data

volumes:
  teedy-data:
  teedy-db:
